name: Deploy 07_Docs Wiki

on:
  push:
    branches:
      - main
    paths:
      - "07_Docs/**"
      - ".github/workflows/07-docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 07-docs-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: 07_Docs/_site/package-lock.json
      - name: Install dependencies
        working-directory: 07_Docs/_site
        run: npm ci
      - name: Build static site
        working-directory: 07_Docs/_site
        run: npm run build
        env:
          NEXT_PUBLIC_DEPLOY_TARGET: github-pages
      - name: Prevent Jekyll processing
        run: touch 07_Docs/_site/out/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 07_Docs/_site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
